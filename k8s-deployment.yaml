apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafeteria-deployment
  labels:
    app: cafeteria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cafeteria
  template:
    metadata:
      labels:
        app: cafeteria
    spec:
      containers:
      - name: cafeteria
        image: poovarasans072/cafeteria-app:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cafeteria-service
spec:
  selector:
    app: cafeteria
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080